name: flutter_analytics_sdk
description: "Flutter POC demonstrating Meta SDK, Firebase Analytics, and conversion tracking."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  facebook_app_events: ^0.19.0
  firebase_analytics: ^11.0.0
  firebase_core: ^3.0.0
  flutter_riverpod: ^2.4.0
  hive_flutter: ^1.1.0
  connectivity_plus: ^6.0.0
  intl: ^0.20.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
